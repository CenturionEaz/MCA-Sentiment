spring.application.name=econsultation
server.port=8080

# Multipart file upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mca_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Static resources
spring.web.resources.static-locations=classpath:/static/,file:python-ai-service/static/

# AI Service
ai.service.url=${AI_SERVICE_URL:http://localhost:5001}

# File upload directory
file.upload-dir=uploads/

# Report output directory
report.output-dir=src/main/resources/static/

# Google OAuth2 (replace with your credentials)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:1043550878131-hv0b9g3t6b1ptdf2cdolc8ag943j4ub4.apps.googleusercontent.com}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET: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}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.provider.google.user-name-attribute=name
