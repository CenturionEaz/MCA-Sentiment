# ============================================================
# backend/service.yaml — Spring Boot Backend Service
# ============================================================
# PURPOSE: A Service is a stable network endpoint for Pods.
# Pods have dynamic IP addresses (change on restart), but a
# Service gives a FIXED DNS name and IP.
#
# SERVICE TYPES:
#   ClusterIP    → internal only (default) — used here so only
#                  Ingress/other Pods can reach backend
#   NodePort     → exposes on a static port on every Node
#   LoadBalancer → provisions a cloud load balancer
#   ExternalName → maps to an external DNS name
#
# HOW SELECTOR WORKS:
#   Service finds Pods by label matching:
#   selector.app: mca-backend  →  Pods with label app: mca-backend
#   Traffic is load-balanced across ALL matching Pods (round-robin by default)
#
# WHY ClusterIP HERE?
#   - Backend is accessed externally ONLY through Ingress
#   - Direct external access is not needed
#   - More secure; minimises attack surface
# ============================================================

apiVersion: v1
kind: Service
metadata:
  name: mca-backend-service
  namespace: mca-econsultation
  labels:
    project: mca-econsultation
    component: backend
spec:
  type: ClusterIP
  selector:
    app: mca-backend             # Routes traffic to all Pods with this label
  ports:
    - name: http
      protocol: TCP
      port: 80                   # Port exposed by the Service (inside cluster)
      targetPort: 8080           # Port the backend container listens on
