# ============================================================
# backend/hpa.yaml — Horizontal Pod Autoscaler for Backend
# ============================================================
# PURPOSE: HPA automatically increases or decreases the number
# of backend Pods based on observed CPU or memory usage.
#
# HOW HPA WORKS:
#   1. Metrics Server collects CPU/Memory from all Pods
#   2. HPA controller checks metrics every 15 seconds
#   3. If avgCPU > targetCPUUtilizationPercentage → scale UP
#   4. If avgCPU < target for cooldown period → scale DOWN
#
# FORMULA:
#   desired_replicas = ceil(current_replicas * (currentMetric / targetMetric))
#
# EXAMPLE:
#   minReplicas=2, targetCPU=70%
#   If 2 Pods each at 140% CPU → desired = ceil(2 * 140/70) = 4 Pods
#
# WHY HPA?
#   - Handles traffic spikes automatically (e.g., many users uploading CSV)
#   - Saves resources when traffic is low (scales down to minReplicas)
#   - No manual intervention needed
#
# PREREQUISITE: metrics-server must be installed in the cluster
#   Minikube: minikube addons enable metrics-server
# ============================================================

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mca-backend-hpa
  namespace: mca-econsultation
  labels:
    project: mca-econsultation
    component: backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mca-backend            # This HPA controls the mca-backend Deployment

  minReplicas: 2                 # Always keep at least 2 Pods (High Availability)
  maxReplicas: 8                 # Never scale beyond 8 Pods

  metrics:
    # ── CPU-based scaling ─────────────────────────────────
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70   # Scale up if avg CPU across all Pods > 70%

    # ── Memory-based scaling ──────────────────────────────
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80   # Scale up if avg Memory > 80%

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60   # Wait 60s before deciding to scale up
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60            # Add max 2 Pods per 60 seconds
    scaleDown:
      stabilizationWindowSeconds: 300  # Wait 5 min before scaling down (avoids thrashing)
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120           # Remove max 1 Pod per 2 minutes
