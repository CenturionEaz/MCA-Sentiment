# ============================================================
# secret.yaml — Kubernetes Secrets
# ============================================================
# PURPOSE: Stores SENSITIVE data (passwords, tokens, keys)
# as base64-encoded values. Kubernetes keeps Secrets
# separate from ConfigMaps and can restrict access via RBAC.
#
# WHY SECRETS (not ConfigMap)?
#   - Kubernetes marks Secret objects as "sensitive"
#   - Can be encrypted at rest (when etcd encryption is enabled)
#   - Can be managed separately by ops team / Vault
#   - Prevents accidental logging of sensitive values
#
# HOW TO ENCODE VALUES:
#   Linux/Mac:  echo -n "your_value" | base64
#   PowerShell: [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes("your_value"))
#
# CURRENT VALUES (base64 of defaults — CHANGE BEFORE PRODUCTION):
#   postgres      → cG9zdGdyZXM=
#   changeme123   → Y2hhbmdlbWUxMjM=
#   (Google OAuth → replace with your real credentials)
#
# WARNING: Do NOT commit this file with real secrets to Git.
#          Use .gitignore or a secrets manager (HashiCorp Vault,
#          AWS Secrets Manager, Sealed Secrets) in production.
# ============================================================

apiVersion: v1
kind: Secret
metadata:
  name: mca-secrets
  namespace: mca-econsultation
  labels:
    project: mca-econsultation
type: Opaque
data:
  # PostgreSQL credentials
  # Decode: echo "cG9zdGdyZXM=" | base64 --decode  → "postgres"
  POSTGRES_USER: cG9zdGdyZXM=

  # Decode: echo "Y2hhbmdlbWUxMjM=" | base64 --decode  → "changeme123"
  # IMPORTANT: Change this to a strong password before deployment
  POSTGRES_PASSWORD: Y2hhbmdlbWUxMjM=

  # Spring datasource password (must match POSTGRES_PASSWORD above)
  SPRING_DATASOURCE_PASSWORD: Y2hhbmdlbWUxMjM=

  # Google OAuth2 credentials (base64 of your actual values)
  # Replace these with: echo -n "your-client-id" | base64
  GOOGLE_CLIENT_ID: UkVQTEFDRV9XSVRIX1lPVVJfR09PR0xFX0NMSUVOVF9JRA==
  GOOGLE_CLIENT_SECRET: UkVQTEFDRV9XSVRIX1lPVVJfR09PR0xFX0NMSUVOVF9TRUNSRVQ=
