version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: mca-postgres
    environment:
      POSTGRES_DB: mca_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-service:
    build:
      context: ./python-ai-service
      dockerfile: Dockerfile
    container_name: mca-ai-service
    ports:
      - "5001:5001"
    volumes:
      - ./python-ai-service/policy_sentiment_final:/app/policy_sentiment_final
      - ./python-ai-service/static:/app/static
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mca-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/mca_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      AI_SERVICE_URL: http://ai-service:5001
    depends_on:
      postgres:
        condition: service_healthy
      ai-service:
        condition: service_started
    volumes:
      - ./uploads:/app/uploads
      - ./python-ai-service/static:/app/python-ai-service/static

volumes:
  postgres_data:
