# ============================================================
# docker-compose.yml — Local Multi-Container Orchestration
# ============================================================
# PURPOSE: Runs all 3 services (backend, ai-service, postgres)
# together on your local machine with a single command:
#   docker compose up --build
#
# HOW IT DIFFERS FROM KUBERNETES:
#   Docker Compose = single machine, single host, dev/test
#   Kubernetes     = multi-node cluster, production, auto-healing
#
# SERVICES:
#   postgres    → PostgreSQL 15 database (port 5432)
#   ai-service  → Python Flask ML service (port 5001)
#   app         → Spring Boot backend + Thymeleaf UI (port 8080)
#
# STARTUP ORDER (depends_on):
#   postgres must be healthy → then ai-service starts → then app starts
#
# USAGE:
#   cp .env.example .env          # Set your passwords first!
#   docker compose up --build     # Build images and start all services
#   docker compose down           # Stop and remove containers
#   docker compose down -v        # Also remove volumes (wipes DB data)
# ============================================================

version: '3.8'

services:

  # ──────────────────────────────────────────────────────────
  # PostgreSQL 15 — Relational Database
  # ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: mca-postgres
    restart: unless-stopped              # Auto-restart on crash, not on manual stop
    environment:
      POSTGRES_DB: mca_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required. Copy .env.example to .env}
    ports:
      - "5432:5432"                      # Expose for local DB tools (pgAdmin, DBeaver)
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d mca_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - mca-network

  # ──────────────────────────────────────────────────────────
  # Python Flask AI Service — Sentiment Analysis
  # ──────────────────────────────────────────────────────────
  ai-service:
    build:
      context: ./python-ai-service
      dockerfile: Dockerfile
    container_name: mca-ai-service
    restart: unless-stopped
    ports:
      - "5001:5001"                      # Expose for direct testing via curl/Postman
    environment:
      PORT: "5001"
      LOG_LEVEL: "INFO"
    volumes:
      # Model files (if not bundled in image, mount from host)
      - ./python-ai-service/static:/app/static
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s                  # Model loading takes time
    networks:
      - mca-network

  # ──────────────────────────────────────────────────────────
  # Spring Boot Application — Backend + UI
  # ──────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mca-backend
    restart: unless-stopped
    ports:
      - "8080:8080"                      # Access UI at http://localhost:8080
    environment:
      # Database connection — uses Docker Compose service DNS name 'postgres'
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/mca_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"

      # AI service URL — uses Docker Compose service DNS name 'ai-service'
      AI_SERVICE_URL: http://ai-service:5001

      # Google OAuth2 (optional — leave defaults if not testing auth)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-your-google-client-id}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-your-google-client-secret}
    depends_on:
      postgres:
        condition: service_healthy       # Wait for Postgres to be ready      # Wait for AI service to be ready
    volumes:
      - ./uploads:/app/uploads                           # Uploaded CSV files
      - ./python-ai-service/static:/app/python-ai-service/static  # Word cloud outputs
    networks:
      - mca-network

# ──────────────────────────────────────────────────────────
# Named Volumes — Data persists between container restarts
# ──────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
    # This volume stores PostgreSQL data files
    # Survives: docker compose down
    # Deleted by: docker compose down -v

# ──────────────────────────────────────────────────────────
# Custom Bridge Network — All services communicate here
# ──────────────────────────────────────────────────────────
networks:
  mca-network:
    driver: bridge
    # WHY custom network?
    #   - All services get automatic DNS resolution by service name
    #   - 'postgres', 'ai-service', 'app' are reachable by hostname
    #   - Isolated from other Docker networks on your machine
